name: Morning Master Selection

on:
  schedule:
    # Runs at 04:00 UTC exactly (09:30 AM IST, Mon-Fri)
    - cron: '0 4 * * 1-5'
  
  workflow_dispatch: # Gives you the manual 'Run workflow' button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip show yfinance | grep Version

      - name: Run Morning Master
        run: python morning_master.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add first, then pull to avoid conflicts, then commit and push
          git add live_cmp.csv
          git pull origin main --rebase
          git commit -m "Morning Market Open Scan" || echo "No changes to commit"
          git push
