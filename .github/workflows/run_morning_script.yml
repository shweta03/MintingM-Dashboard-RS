name: Morning Master Selection
on:
  schedule:
    - cron: '45 3 * * 1-5' # Runs at 03:45 UTC -> 9:15 AM IST (Mon-Fri)
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Morning Master
        run: python morning_master.py
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add live_cmp.csv
          git commit -m "Morning Top 20 Selection" || echo "No changes to commit"
          git push
