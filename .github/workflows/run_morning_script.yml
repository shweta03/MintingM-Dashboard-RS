name: Morning Master Selection

on:
  schedule:
    # 0 4 UTC = exactly 9:30 AM IST, Monday through Friday
    - cron: '0 4 * * 1-5' 
  
  workflow_dispatch:

jobs:
# ... (the rest of your file stays exactly the same)
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Morning Master
        run: python morning_master.py
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add live_cmp.csv
          git commit -m "Morning Top 20 Selection" || echo "No changes to commit"
          git push
