name: Morning Master Selection

on:
  schedule:
    # 04:00 UTC = 09:30 AM IST (Mon-Fri)
    - cron: '0 4 * * 1-5'
  
  workflow_dispatch: # Allows you to run it manually via the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas yfinance pandas_ta numpy

      - name: Run Morning Master
        run: python morning_master.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull origin main --rebase
          git add live_cmp.csv
          git commit -m "Morning Market Open Scan" || echo "No changes"
          git push
