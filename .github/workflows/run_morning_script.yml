name: Morning YFinance Batch

on:
  schedule:
    # Runs at 2:30 AM UTC (8:00 AM IST) Monday through Friday
    - cron: '30 2 * * 1-5'
  
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # Added to prevent Friday's heavy financial fetch from timing out
    timeout-minutes: 30 

    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run the Python Math
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        # Ensure your script filename is exactly morning_batch.py
        run: python morning_batch.py
