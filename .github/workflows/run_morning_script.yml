name: MintingM 5-Minute Live Update

on:
  schedule:
    # Runs every 5 minutes from 9:15 AM to 3:30 PM IST, Monday to Friday
    - cron: '*/5 4-10 * * 1-5'
  workflow_dispatch: # Allows you to trigger it manually anytime

jobs:
  run-live-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests gspread yfinance

      - name: Run Script
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python live_prices.py
