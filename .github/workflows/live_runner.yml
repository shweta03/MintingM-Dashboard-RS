name: Live Power BI Sync

on:
  schedule:
    # 03:30 to 09:00 UTC = 09:00 to 14:30 IST (Every 5 mins)
    - cron: '*/5 3-8 * * 1-5'
    # 09:00 to 10:00 UTC = 14:30 to 15:30 IST (Every 5 mins)
    - cron: '0,5,10,15,20,25,30 9 * * 1-5'
  workflow_dispatch:

jobs:
  live-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance pandas gspread requests

      - name: Run Live Update
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python live_prices.py
