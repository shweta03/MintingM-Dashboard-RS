name: Live CMP Updater

on:
  schedule:
    # Runs at :20 and :50 past the hour, from 04:00 to 09:59 UTC (9:50 AM to 3:20 PM IST) Monday-Friday
    - cron: '20,50 4-9 * * 1-5'
    # Runs exactly at 10:00 UTC (3:30 PM IST) for the final closing bell Monday-Friday
    - cron: '0 10 * * 1-5'
  
  workflow_dispatch: # This keeps the manual "Run workflow" button in GitHub so you can test it

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # CRITICAL: This gives the GitHub bot permission to actually save the file!
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run Live Pinger
        run: python live.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Live CMPs"
          file_pattern: 'live_cmp.csv'
