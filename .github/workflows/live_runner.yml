name: Live CMP Updater

on:
  schedule:
    # 04:20 UTC to 09:50 UTC (9:50 AM IST to 3:20 PM IST)
    # Runs at :20 and :50 every hour
    - cron: '20,50 4-9 * * 1-5'
    
    # 10:00 UTC (3:30 PM IST) 
    # The final closing bell run
    - cron: '0 10 * * 1-5'
  
  workflow_dispatch: # Allows you to click "Run Workflow" manually for testing

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run Live Pinger
        run: python live_pinger.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Live CMPs (IST schedule)"
          file_pattern: 'live_cmp.csv'
